    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p>Психика — жоғары ұйымдасқан тірі материяның объективті дүниені белсенді бейнелеу, сол дүниенің субъективті бейнесін құру және осы негізде мінез-құлық пен іс-әрекетті реттеу қасиеті.</p>\n    <p>Психиканың ең қарапайым алғышарты — тітіркенгіштік. Ол тірі организмнің биологиялық маңызды әсерлерге жауап беру қабілеті ретінде көрінеді. Кейін сезгіштік пайда болады, ол организмге биологиялық бейтарап белгілерге де жауап беруге мүмкіндік береді.</p>\n    <p>Сезгіштіктің пайда болуы психиканың басталу белгісі ретінде қарастырылады. Сезгіштік организмнің орта туралы ақпарат алып, мінез-құлқын күрделірек реттеуіне жағдай жасайды.</p>\n    <p>Мінез-құлық — тірі организмнің сыртқы орта әсерлеріне күрделі жауап беру жүйесі. Жануарларда мінез-құлық көбіне сыртқы жағдайлармен және биологиялық мағынамен анықталса, адамда ол сана, мақсат, мотив және өзін-өзі реттеу арқылы ұйымдасады.</p>\n    <p>Сана — психикалық бейнелеу мен реттеудің ең жоғары деңгейі. Ол адамға өзін ортадан бөліп тануға, «Мен-тұжырымдамасын» қалыптастыруға, құндылықтар мен идеалдарға сүйене отырып мінез-құлқын реттеуге мүмкіндік береді.</p>\n    <p>Психиканың негізгі функциялары: қоршаған шындықты бейнелеу, организм тұтастығын сақтау және мінез-құлықты реттеу. Бұл функциялар бірігіп, тірі организмнің ортаға бейімделуін қамтамасыз етеді.</p>\n  ",

    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p>Адам санасының пайда болуы биологиялық және әлеуметтік факторлардың бірлігінде түсіндіріледі. Биологиялық эволюция адамның миы мен дене құрылымын күрделендірді, ал еңбек, тіл және қоғам сананың дамуына жағдай жасады.</p>\n    <p>Еңбек адамның табиғатты өзгертуіне, басқа адамдармен бірігіп әрекет етуіне және әлеуметтік қатынастардың жаңа түрін қалыптастыруына ықпал етті. Ұжымдық еңбек қарым-қатынасты қажет етті, ал қарым-қатынастың жоғары формасы — тіл мен сөйлеу сананың дамуында шешуші рөл атқарды.</p>\n    <p>Сөйлеу адамға затпен тікелей әрекеттеспей-ақ ақпарат алуға, тәжірибені жеткізуге, мінез-құлықты сөз арқылы реттеуге мүмкіндік берді. Сондықтан тіл сананың пайда болуы мен дамуының маңызды шарты ретінде қарастырылады.</p>\n    <p>Л.С. Выготскийдің мәдени-тарихи концепциясы бойынша адамда жануарларда жоқ ерекше жоғары психикалық функциялар қалыптасады. Оларға ерікті ес, ерікті зейін, логикалық ойлау сияқты саналы, әлеуметтік және жанама реттелетін процестер жатады.</p>\n    <p>Выготский жоғары психикалық функциялардың негізгі құралы ретінде белгілерді қарастырды. Белгі — адамның өз есін, зейінін, ойлауын және мінез-құлқын басқаруға көмектесетін психологиялық құрал.</p>\n    <p>Интериоризация — сыртқы әлеуметтік әрекеттер мен белгілік құралдардың ішкі психикалық әрекетке айналу процесі. Алғашында балаға ересек адам сөз арқылы әсер етеді, кейін бала сол сөзді өз мінез-құлқын басқару құралы ретінде қолдана бастайды.</p>\n  ",

    "desc": "Бұл бөлімде түйсіктің психикалық процесс ретіндегі мәні, түйсік түрлері, рецепторлар, сезімталдық, түйсік қасиеттері, абсолюттік және айырма табалдырық, сенсорлық адаптация, түйсіктердің өзара әрекеттесуі, сенсибилизация және синестезия қарастырылады.",
    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p>Түйсік — қоршаған дүниедегі заттар мен құбылыстардың жеке қасиеттерін бейнелейтін ең қарапайым психикалық процесс. Түйсік сыртқы немесе ішкі тітіркендіргіштің рецепторға әсер етуі нәтижесінде пайда болады.</p>\n    <p>Түйсіктерді әртүрлі негіз бойынша жіктеуге болады. Шеррингтон жүйесінде түйсіктер үш негізгі топқа бөлінеді: интероцептивтік, проприоцептивтік және экстероцептивтік түйсіктер.</p>\n    <p>Интероцептивтік түйсіктер организмнің ішкі ортасынан ақпарат береді. Проприоцептивтік түйсіктер дененің кеңістіктегі қалпы мен қозғалысын реттеуге қатысады. Экстероцептивтік түйсіктер сыртқы дүниеден ақпарат алуға мүмкіндік береді.</p>\n    <p>Экстероцептивтік түйсіктер контакттық және дистанттық болып бөлінеді. Контакттық түйсіктер заттың сезім мүшесіне тікелей әсер етуінен пайда болады, мысалы дәм және сипап сезу. Дистанттық түйсіктер қашықтықтағы объектілердің қасиеттерін бейнелейді, мысалы көру және есту.</p>\n    <p>Түйсіктің негізгі қасиеттеріне сапа, қарқындылық, ұзақтық және кеңістіктік кеңістікте орналасу жатады. Сонымен қатар түйсіктер абсолюттік және айырма табалдырықтарымен сипатталады.</p>\n    <p>Абсолюттік табалдырық — түйсік алғаш пайда болатын ең төменгі тітіркендіргіш күші. Айырма табалдырығы — екі тітіркендіргіш арасындағы адам әрең байқайтын ең аз айырмашылық.</p>\n    <p>Сенсорлық адаптация — сезім мүшесінің әсер етуші тітіркендіргішке бейімделуінен сезімталдықтың өзгеруі. Күшті тітіркендіргіш әсерінде сезімталдық төмендейді, әлсіз тітіркендіргіште немесе тітіркендіргіш жоқ кезде сезімталдық артады.</p>\n    <p>Түйсіктер бір-бірінен оқшау жұмыс істемейді. Бір анализатордың жұмысы басқа анализаторларға әсер етуі мүмкін. Сезімталдықтың артуы сенсибилизация деп, ал бір анализатор әсерінен басқа анализаторға тән түйсіктің пайда болуы синестезия деп аталады.</p>\n  ",

    "desc": "Бұл бөлімде қабылдаудың танымдық процесс ретіндегі мәні, оның түйсікпен байланысы, қабылдау қасиеттері, апперцепция, константтылық, иллюзиялар, кеңістікті, қозғалысты және уақытты қабылдау ерекшеліктері қарастырылады.",
    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p>Қабылдау — заттар мен құбылыстардың адамға тікелей әсер етуі кезінде олардың тұтас бейнесін бейнелейтін танымдық психикалық процесс. Түйсік жеке қасиеттерді бейнелесе, қабылдау сол қасиеттерді біріктіріп, заттың тұтас бейнесін жасайды.</p>\n    <p>Қабылдау түйсіктердің қарапайым қосындысы емес. Ол адамның өткен тәжірибесімен, іс-әрекетімен, мақсатымен және нақты жағдаймен байланысты күрделі процесс.</p>\n    <p>Қабылдаудың негізгі қасиеттеріне заттылық, тұтастық, құрылымдылық, мағыналылық, таңдамалылық, апперцепция және константтылық жатады. Бұл қасиеттер адамның сыртқы дүниені тұрақты әрі мағыналы түрде қабылдауына мүмкіндік береді.</p>\n    <p>Константтылық қабылданатын объектінің кейбір қасиеттері жағдай өзгерсе де салыстырмалы тұрақты болып сақталуын білдіреді. Мысалы, зат алыстаған сайын тор қабықтағы бейнесі кішірейсе де, біз оның нақты көлемін біршама тұрақты қабылдаймыз.</p>\n    <p>Қабылдау иллюзиялары — қабылдау жағдайларының әсерінен заттың қасиеттерін бұрмалап қабылдау. Мұндай иллюзиялар контраст, бүтін мен бөліктің арақатынасы, жарық, түс, перспектива, таныс немесе таныс емес объектілер әсерінен туындауы мүмкін.</p>\n    <p>Кеңістікті қабылдау үшін бірнеше анализатор бірге жұмыс істейді: көру, тактильді-кинестетикалық, вестибулярлық жүйелер. Тереңдік пен қашықтықты қабылдауда бинокулярлық көру, екі көз осінің жақындасуы, екі көз осінің алшақтауы және көз бұршағының бейімделуі маңызды.</p>\n    <p>Қозғалысты қабылдау тек зат бейнесінің тор қабықта жылжуымен түсіндірілмейді. Мұнда көз қозғалысы, эфференттік сигналдар, стробоскопиялық эффект, фигура мен фон қатынасы және адамның өткен тәжірибесі маңызды рөл атқарады.</p>\n    <p>Уақытты қабылдау ұзақтықты, реттілікті және оқиғалардың уақыттық орналасуын бағалаумен байланысты. Уақытты субъективті бағалау оқиғалардың қызықтылығына, эмоционалдық бояуына және адамның іс-әрекетіне тәуелді болады.</p>\n  ",

    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p>Елестету — қазіргі сәтте тікелей қабылданбайтын, бірақ бұрынғы тәжірибе негізінде қайта жаңғыртылатын заттар мен құбылыстардың бейнесін жасау процесі.</p>\n    <p>Елестетудің негізінде өткен қабылдау тәжірибесі жатады. Сондықтан елестету қабылдау, ес, қиял, ойлау және сөйлеу сияқты танымдық процестермен тығыз байланысты.</p>\n    <p>Елестетудің екі негізгі түрі бар: ес елестетулері және қиял елестетулері. Ес елестетулері бұрын тікелей қабылданған объектілерге сүйенеді, ал қиял елестетулері бұрынғы тәжірибені шығармашылық қайта өңдеу арқылы қалыптасады.</p>\n    <p>Елестетудің негізгі сипаттамалары — көрнекілік, фрагментарлық, тұрақсыздық, өзгермелілік және жалпыланғандық. Елестету қабылдау бейнесіне ұқсас болғанымен, әдетте одан әлсіз, көмескі және толық емес болады.</p>\n    <p>Елестету әрқашан белгілі бір дәрежеде жалпыланған образ болып табылады. Ол нақты зат туралы жеке естеліктерді ғана емес, тұрақты және маңызды белгілерді біріктіріп береді.</p>\n    <p>Елестету сенсорлық-перцептивтік образдар мен ұғымдар арасындағы аралық буын ретінде қарастырылады. Сондықтан ол қабылдаудан ойлауға өтуге көмектеседі.</p>\n    <p>Елестетудің негізгі функциялары: сигналдық, реттеуші және баптаушы. Елестету адамға бұрынғы тәжірибеге сүйеніп әрекет етуге, қажетті ақпаратты таңдауға және алдағы іс-әрекетке дайындалуға мүмкіндік береді.</p>\n  ",

    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p>Ес — адамның өткен тәжірибесін есте сақтау, сақтау және кейін қайта жаңғыртуға мүмкіндік беретін күрделі психикалық процесс. Ес арқылы адам білімін, дағдыларын, өмірлік тәжірибесін жинақтап, қажет кезде пайдалана алады.</p>\n    <p>Ес бірнеше өзара байланысты процестерден тұрады: есте сақтау, сақтау, тану, қайта жаңғырту және ұмыту. Қабылданған нәрсенің із қалдыруы есте сақтаудың алғышарты болады.</p>\n    <p>Ес тарихында ассоциация ұғымы ерекше орын алды. Аристотельден басталған ассоциация принциптері бойынша елестер мен ойлар жақындық, ұқсастық және қарама-қарсылық негізінде байланысады.</p>\n    <p>Эббингауз есті эксперименттік зерттеуге үлкен үлес қосты. Ол мағынасыз буындарды жаттау арқылы ұмыту заңын және қатардағы материалдың басы мен соңын жақсырақ есте сақтау құбылысын көрсетті.</p>\n    <p>Ес түрлері бірнеше өлшем бойынша жіктеледі. Психикалық белсенділік сипатына қарай ес қозғалыстық, эмоциялық, образдық және сөздік-логикалық болып бөлінеді. Мақсат сипатына қарай еріксіз және ерікті ес ажыратылады. Сақталу ұзақтығына қарай қысқа мерзімді, ұзақ мерзімді және оперативтік ес бөлінеді.</p>\n    <p>Қозғалыстық ес қимылдарды есте сақтау мен қайта орындауға негіз болады. Эмоциялық ес сезімдерді сақтайды. Образдық ес бұрын қабылданған бейнелерді қайта жаңғыртады. Сөздік-логикалық ес ойлар мен мағыналарды есте сақтауға байланысты.</p>\n    <p>Қысқа мерзімді ес ақпаратты өте қысқа уақытқа сақтайды және ұзақ мерзімді ес үшін сүзгі қызметін атқарады. Оперативтік ес адам дәл қазір орындап жатқан әрекетке қажет аралық нәтижелерді ұстап тұрады.</p>\n    <p>Ерікті есте сақтау арнайы мақсат пен мнемикалық тәсілдерді қажет етеді. Еріксіз есте сақтау арнайы мақсатсыз жүреді, бірақ адам үшін маңызды, қызықты немесе әрекетпен байланысты материал жиі жақсы сақталады.</p>\n  ",

    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p>Қиял — нақты шындықты бейнелейтін елестерді қайта өңдеу және солардың негізінде жаңа елестер мен жаңа психикалық образдар жасау процесі.</p>\n    <p>Қиялдың негізінде адамның өткен тәжірибесі жатады. Адам ешқашан мүлде бос жерден образ жасамайды: жаңа образдар бұрын қабылданған заттар мен құбылыстардың жеке жақтарын өзгерту, біріктіру және қайта құру арқылы пайда болады.</p>\n    <p>Қиял ес және ойлаумен тығыз байланысты. Егер адам бұрынғы тәжірибедегі образды қайта жаңғыртса, бұл көбіне ес процесі болады. Ал сол образдар жаңа үйлесімге түсіп, бұрын болмаған бейне жасаса, бұл қиял қызметі болып саналады.</p>\n    <p>Қиял адамның еңбек әрекетінде ерекше маңызды. Адам бір нәрсені жасамас бұрын, алдымен оның нәтижесін санасында алдын ала елестетеді. Сондықтан қиял мақсат қою, жоспарлау және әрекетті алдын ала құрумен байланысты.</p>\n    <p>Қиял еріксіз және ерікті болып бөлінеді. Еріксіз қиял адамның арнайы мақсатынсыз пайда болады, мысалы түс көру немесе қалғып отырғанда пайда болатын бейнелер. Ерікті қиялда адам белгілі бір образды саналы түрде жасауға ұмтылады.</p>\n    <p>Ерікті қиялдың маңызды түрлері — қайта жасаушы қиял, шығармашылық қиял және арман. Қайта жасаушы қиял сипаттама, мәтін, схема немесе сызба бойынша объект бейнесін қайта құрады. Шығармашылық қиял жаңа образды өз бетінше жасауға бағытталады.</p>\n    <p>Қиял образдарын жасауда талдау, абстракциялау, синтез, агглютинация, схемаландыру және акценттеу сияқты механизмдер қолданылады. Агглютинацияда әртүрлі объектілердің белгілері бір образға біріктіріледі, ал акценттеуде белгілі бір белгі ерекше күшейтіледі.</p>\n    <p>Қиял шығармашылықтың маңызды шарты болып табылады. Ғылыми, техникалық және көркем шығармашылықта адам бар тәжірибені қайта өңдеп, жаңа идея, жаңа образ немесе жаңа шешім жасайды.</p>\n  ",

    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p>Ойлау — шындықты шығармашылық бейнелеу және қайта құру негізінде жаңа білім тудыратын жоғары танымдық психикалық процесс. Ойлау жеке фактілерден жалпыға, ал жалпыдан қайта нақты жағдайға өтуге мүмкіндік береді.</p>\n    <p>Ойлаудың бірінші маңызды белгісі — шындықты жалпыланған түрде бейнелеу. Адам жеке заттар мен оқиғалардағы ортақ, маңызды байланыстарды бөліп алып, оларды басқа жағдайларға қолданады.</p>\n    <p>Ойлаудың екінші белгісі — жанама таным. Адам затпен тікелей байланысқа түспей-ақ, жанама белгілер мен ақпарат арқылы оның қасиеттері туралы қорытынды жасай алады.</p>\n    <p>Ойлау көбіне проблемалық жағдайдан басталады. Адам алдында сұрақ немесе міндет пайда болғанда, жауап бірден табылмайды, оны табу үшін ақпаратты талдау, салыстыру, өзгерту және қорытынды жасау қажет болады.</p>\n    <p>Ойлау сөйлеумен тығыз байланысты. Ой сөз арқылы қалыптасып, нақтыланады. Л.С. Выготскийдің формуласы бойынша, ой сөзде жүзеге асады. Бірақ ойлау мен сөйлеу толық бірдей емес: бір ойды әртүрлі сөзбен айтуға болады.</p>\n    <p>Ойлау түрлері теориялық және практикалық болып бөлінеді. Теориялық ойлауда ұғымдық және образдық ойлау ажыратылады, ал практикалық ойлауда көрнекі-образдық және көрнекі-әрекеттік ойлау бөлінеді.</p>\n    <p>Ойлаудың негізгі формалары — ұғым, пікір және ой қорытындысы. Ұғым заттар мен құбылыстардың жалпы және маңызды қасиеттерін бейнелейді. Пікір заттар арасындағы байланыстарды көрсетеді. Ой қорытындысы бұрынғы пікірлер негізінде жаңа пікір жасауға мүмкіндік береді.</p>\n    <p>Интеллект ойлаумен байланысты, бірақ оны тек бейімделу деп қана түсіндіруге болмайды. Маклаков интеллектіні адамның танымдық әрекетінің табыстылығын қамтамасыз ететін әртүрлі ақыл-ой қабілеттерінің жиынтығы ретінде қарастырады.</p>\n  ",

    "desc": "Бұл бөлімде сөйлеудің жалпы сипаттамасы, сөйлеу мен тілдің айырмашылығы, тілдің құрамы, сөз мағынасы, сөйлеудің қарым-қатынас құралы ретіндегі қызметі, эмоционалды-экспрессивтік жағы, сөйлеудің физиологиялық негіздері, Вернике және Брока орталықтары, афазия түрлері, сөйлеу түрлері және баланың сөйлеу дамуы қарастырылады.",
    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p>Сөйлеу — адамдардың тіл арқылы қарым-қатынас жасау процесі. Сөйлеу адамға тән ерекше психикалық процесс болып табылады және адамның әлеуметтік, психикалық және мәдени дамуымен тығыз байланысты.</p>\n    <p>Тіл мен сөйлеу бірдей емес. Тіл — қоғам қалыптастырған шартты белгілер жүйесі. Ол сөздік құрамнан, грамматикалық құрылымнан және фонетикалық жүйеден тұрады. Ал сөйлеу — осы тілді нақты қарым-қатынаста қолдану процесі.</p>\n    <p>Сөздің мағынасы әрқашан белгілі бір жалпылауды білдіреді. Бірақ нақты сөйлеуде сөздің мағынасы контекст арқылы нақтыланады. Сондықтан бір сөз әртүрлі сөйлеу жағдайында әртүрлі нақты мағынаға ие болуы мүмкін.</p>\n    <p>Сөйлеуде тек ақпарат берілмейді, адамның эмоциялық қатынасы да көрінеді. Сөздің интонациясы, дауыс ырғағы, екпін, кідіріс сияқты белгілер сөйлеудің эмоционалды-экспрессивтік жағын құрайды.</p>\n    <p>Сөйлеудің тарихи дамуы кинетикалық қарым-қатынас формаларынан басталып, қол қимылдары арқылы берілетін қарым-қатынасқа, кейін дыбыстық сөйлеуге және жазбаша сөйлеуге дейін дамыды. Сөйлеу мен тіл қоғамдық-тарихи дамудың өнімі болып саналады.</p>\n    <p>Сөйлеудің физиологиялық негіздері орталық және перифериялық жүйелерден тұрады. Перифериялық жүйеге тыныс алу мүшелері, көмей, ауыз және мұрын қуысы кіреді. Орталық жүйеге ми қыртысындағы сөйлеу орталықтары жатады.</p>\n    <p>Вернике орталығы сөйлеуді естіп түсінумен байланысты. Бұл орталық бұзылса, адам жеке дыбыстарды естігенімен, сөздерді ажырата алмайды. Брока орталығы сөздерді айту қозғалыстарын ұйымдастырады; ол бұзылса, адамның сөйлеуі үзілісті, қиын және телеграфтық сипатқа ие болады.</p>\n    <p>Сөйлеудің түрлеріне ауызша және жазбаша сөйлеу, диалог және монолог, сыртқы және ішкі сөйлеу, белсенді және пассивті сөйлеу жатады. Баланың сөйлеуі ересек адаммен қарым-қатынаста, сөзді түсіну мен қолдану тәжірибесінде және мектептегі тілдік оқытуда дамиды.</p>\n  ",

    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p>Зейін — психикалық әрекеттің белгілі бір объектіге бағытталуы және соған шоғырлануы. Бағыттылық адамның маңызды объектіні таңдап алуын, ал шоғырлану сол объектіге терең енуін білдіреді.</p>\n    <p>Зейін жеке психикалық процесс ретінде әрқалай түсіндіріледі: кейбір ғалымдар оны дербес құбылыс десе, басқалары оны барлық психикалық процестердің ұйымдастырушы жағы деп қарайды. Бірақ кез келген жағдайда зейін қабылдау, ес, ойлау, қиял және әрекет үшін қажет.</p>\n    <p>Зейін сананың айқын және айқын емес аймақтарымен байланысты. Адам үшін дәл қазір маңызды нәрсе сананың орталығына өтеді, ал маңызды емес нәрсе шеткі аймақта қалады.</p>\n    <p>Зейіннің физиологиялық негізінде бір жүйке орталықтарының қозуы және басқаларының тежелуі жатыр. Ретикулярлық формация ми белсенділігін арттыруға қатысады, ал бағдарлау рефлексі жаңа немесе өзгерген тітіркендіргішке ағзаның бұрылу реакциясын көрсетеді.</p>\n    <p>А.А. Ухтомскийдің доминанта принципі зейінді түсіндіруде маңызды. Доминанта — уақытша басым қозу ошағы, ол басқа орталықтардың белсенділігін тежеп, мінез-құлыққа белгілі бағыт береді.</p>\n    <p>Зейіннің негізгі түрлері — еріксіз, ерікті және үйреншікті зейін. Еріксіз зейін күшті, жаңа, қызықты немесе эмоциялық әсер ететін тітіркендіргіштен пайда болады. Ерікті зейін саналы мақсатпен және ерік күшін жұмсаумен байланысты. Үйреншікті зейінде бастапқыда ерік күші қажет болады, бірақ кейін іс-әрекеттің өзі қызықты болып, зейін жеңіл сақталады.</p>\n    <p>Зейіннің негізгі қасиеттері: тұрақтылық, концентрация, бөліну, ауысу, алаңдаушылық және көлем. Бұл қасиеттер адамның оқу, еңбек және танымдық әрекетінің тиімділігін анықтайды.</p>\n  ",

    "desc": "Бұл бөлімде эмоциялар мен сезімдердің мәні, эмоциялық күйлер, көңіл күй, эмоциялардың физиологиялық негіздері, негізгі эмоция теориялары, баланың эмоциялық дамуы, эмоциялардың адам өміріндегі қызметтері және жеке ерекшеліктері қарастырылады.",
    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p>Эмоциялар — адамның шындыққа, өзіне, басқа адамдарға және әрекет нәтижесіне қатынасын білдіретін психикалық құбылыстар. Эмоциялар адамның қажеттіліктерімен, мотивтерімен және жағдайды бағалауымен тығыз байланысты.</p>\n    <p>Эмоциялық күйлер адамның іс-әрекетіне тікелей әсер етеді. Мысалы, көңіл күй жақсы болғанда жұмыс жеңіл әрі жағымды көрінуі мүмкін, ал көңіл күй төмен болғанда сол жұмыс ауыр және шаршататын болып сезіледі.</p>\n    <p>Дарвин эмоцияларды эволюциялық бейімделу механизмі ретінде түсіндірді. Оның ойынша, эмоцияның сыртқы көріністері бұрынғы бейімделуші әрекеттердің қалдығы ретінде сақталған.</p>\n    <p>Джемс–Ланге теориясы эмоцияның негізін денедегі өзгерістерден іздеді: алдымен ағзада физиологиялық өзгерістер пайда болады, кейін адам сол өзгерістерді сезініп, эмоцияны бастан кешіреді.</p>\n    <p>Кэннон–Бард теориясы бұл көзқарасқа қарсы шығып, эмоциялық ішкі күйді сезіну мен денелік өзгерістер бір мезгілде пайда болады деп түсіндірді. Бұл теорияда таламус, гипоталамус және лимбикалық жүйе маңызды рөл атқарады.</p>\n    <p>Когнитивтік теорияларда эмоция адамның жағдайды қалай бағалауына байланысты қарастырылады. Фестингер когнитивтік диссонансты, Шехтер эмоциядағы физиологиялық қозу мен когнитивтік бағалаудың бірлігін, ал Симонов қажеттілік пен ақпарат арақатынасын негізгі фактор ретінде түсіндірді.</p>\n    <p>Эмоциялардың физиологиялық негізінде ми қыртысы, гипоталамус, лимбикалық жүйе, ретикулярлық формация және автономды жүйке жүйесі қатысады. Күшті эмоция кезінде жүрек соғысы, тыныс алу, қан қысымы, терлеу, бұлшық ет кернеуі өзгереді.</p>\n    <p>Эмоциялар адам өмірінде бірнеше қызмет атқарады: бағалау, сигналдық, қозғаушы, бекітуші, ауыстырушы, бейімдеуші және коммуникативтік. Олар адамның мінез-құлқын реттейді, қажеттілік пен мақсатқа қатынасын көрсетеді және басқа адамдармен қарым-қатынаста маңызды рөл атқарады.</p>\n  ",

    "desc": "Бұл біріктірілген бөлімде адамның адаптациясы, функционалдық күйі, психикалық және психофизиологиялық күйлер, релаксация, ұйқы, оптималды жұмыс күйі, қажу, стресс, дистресс, Селье бойынша стресс сатылары, ақпараттық және эмоциялық стресс, эмоционалдық күйлерді реттеу қарастырылады.",
    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p><b>Адаптация</b> — ағзаның және адамның сыртқы орта жағдайларына бейімделуі. Адам биологиялық қана емес, әлеуметтік тіршілік иесі болғандықтан, оның адаптациясы физиологиялық, психикалық және әлеуметтік деңгейлерде жүреді.</p>\n    <p>Бұл үш деңгей бір-бірімен тығыз байланысты. Адамның жалпы жұмыс істеу деңгейі осы деңгейлердің өзара ықпалы арқылы қалыптасады. Осы интегралды сипаттама функционалдық күй деп аталады.</p>\n    <p><b>Функционалдық күй</b> — белгілі бір уақыттағы ағза жүйелерінің жұмыс істеу деңгейін, гомеостазды және адаптация процесін көрсететін динамикалық күй. Ол адамның әрекетке дайындығын, жұмыс қабілетін және өзін-өзі реттеу мүмкіндігін сипаттайды.</p>\n    <p>Психикалық күй салыстырмалы тұрақты, басталуы, өтуі және аяқталуы бар психикалық құбылыс ретінде қарастырылады. Ол психикалық процестердің сол уақыттағы ерекшелігін, тұлға қасиеттерін және жағдай әсерін көрсетеді.</p>\n    <p>Функционалдық күйдің субъективтік және объективтік жақтары бар. Субъективтік жағы адамның ішкі күйді сезіну, өзін сезінуі, қатынасы арқылы көрінеді. Объективтік жағы физиологиялық өзгерістермен, гомеостазды реттеумен және ағза жүйелерінің жұмысымен байланысты.</p>\n    <p>Негізгі функционалдық күйлерге релаксация, ұйқы, оптималды жұмыс күйі, қажу және стресс жатады. Релаксация — тыныштық пен қалпына келу күйі; ұйқы — физикалық және психикалық ресурстарды қалпына келтіретін ерекше күй; оптималды жұмыс күйі — әрекетті ең тиімді орындауға мүмкіндік беретін күй.</p>\n    <p>Қажу ұзақ жүктеме әсерінен жұмыс қабілетінің уақытша төмендеуімен сипатталады. Ол физиологиялық, психологиялық және мінез-құлық деңгейінде көрінеді: сезімталдық төмендейді, зейін мен ес бұзылады, еңбек өнімділігі азаяды.</p>\n    <p><b>Стресс</b> — ағзаның сыртқы немесе ішкі талаптарға беретін спецификалық емес жауабы. Селье бойынша стресс үш сатыдан өтеді: дабыл және мобилизация, қарсылық көрсету, сарқылу.</p>\n    <p>Стресс әрқашан тек жағымсыз құбылыс емес. Орташа стресс ағзаны жұмылдырып, адаптацияға көмектеседі. Бірақ әсер тым күшті немесе ұзақ болса, функционалдық резервтер таусылып, стресс дистресске айналады.</p>\n    <p>Психикалық стресс ақпараттық және эмоциялық болып бөлінеді. Ақпараттық стресс ақпарат көп болғанда және адам оны уақытында өңдей алмағанда пайда болады. Эмоциялық стресс қауіп, қорқыныш, реніш, жауапкершілік, сәтсіздік сияқты жағдайлармен байланысты.</p>\n  ",

    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p><b>Тұлға</b> — индивидтің қоғамда, заттық іс-әрекет пен қарым-қатынаста қалыптасатын жүйелі әлеуметтік сапасы. Адам биологиялық индивид болып туады, бірақ тұлға болып қоғамда, әлеуметтік қатынастар жүйесінде қалыптасады.</p>\n    <p>Индивид, тұлға және индивидуалдылық бірдей ұғымдар емес. Индивид — адамды биологиялық түр өкілі ретінде сипаттайды. Тұлға — оның қоғамдық қатынастардағы әлеуметтік сапасы. Индивидуалдылық — адамның қайталанбас психологиялық, әлеуметтік және табиғи ерекшеліктерінің бірлігі.</p>\n    <p>Мәскеу психологиялық мектебі тұлғаны ең алдымен әлеуметтік қатынастар жүйесінде қарастырса, Б.Г. Ананьев адам құрылымында төрт деңгейді ажыратады: индивид, іс-әрекет субъектісі, тұлға және индивидуалдылық.</p>\n    <p>К.К. Платонов тұлға құрылымында төрт подқұрылымды көрсетеді: биологиялық шартталған ерекшеліктер, психикалық процестер ерекшеліктері, дайындық немесе тәжірибе деңгейі, әлеуметтік шартталған сапалар.</p>\n    <p>Тұлға дамуы социализациямен тығыз байланысты. Социализация — адамның әлеуметтік тәжірибені меңгеруі және оны кейін өз әрекетінде белсенді қайта өндіруі. Ол отбасы, мектеп, құрдастар ортасы және басқа әлеуметтік институттар арқылы жүреді.</p>\n    <p>Э. Эриксон тұлға дамуын өмір бойы өтетін психологиялық кризистер арқылы түсіндіреді. Оның концепциясында әр жас кезеңінде адам белгілі бір қарама-қарсылықты шешеді: сенім–сенімсіздік, автономия–ұят, инициатива–кінә, еңбекқорлық–толыққансыздық, өзін-өзі анықтау–рөлдердің шатасуы және т.б.</p>\n    <p><b>Тұлғаны зерттеу теориялары</b> бірнеше тарихи кезеңнен өтті: философиялық-әдеби, клиникалық және эксперименттік. Алғашқы кезеңде тұлға өте кең түсіндірілсе, клиникалық кезеңде психиатрлар тұлға ерекшеліктерін бақылап зерттеді. ХХ ғасырда тұлғаны эксперименттік және тестілік әдістермен зерттеу күшейді.</p>\n    <p>Тұлға теориялары мінез-құлықты түсіндіру тәсіліне қарай психодинамикалық, социодинамикалық және интеракционистік болып бөлінеді. Психодинамикалық теориялар ішкі психологиялық факторларды, социодинамикалық теориялар сыртқы жағдайды, ал интеракционистік теориялар ішкі және сыртқы факторлардың өзара әрекетін ескереді.</p>\n    <p>Фрейд теориясында тұлға құрылымы ид, эго және супер-эго компоненттерінен тұрады. Ид бейсаналық инстинкттермен, эго шындық талаптарымен, супер-эго моральдық нормалармен байланысты. Олардың арасындағы қайшылық қорғаныс механизмдерін туғызады.</p>\n  ",

    "desc": "Бұл біріктірілген бөлімде тұлға бағыттылығы, мотивация, мотив, қажеттілік, мақсат, өмірлік мақсат, фрустрация, мотивациялық сфераның сипаттамалары, мотивация теориялары, Леонтьев бойынша мотивтің мақсатқа ауысуы, сондай-ақ қабілет, нышандар, жалпы және арнайы қабілеттер, оқу және шығармашылық қабілеттер, қабілетті дамыту шарттары қарастырылады.",
    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p><b>Тұлға бағыттылығы</b> — тұлғаның іс-әрекетін бағдарлайтын тұрақты мотивтер жиынтығы. Ол адамның өмірлік бағытын, қызығуын, құндылықтарын, идеалдарын және сенімдерін көрсетеді.</p>\n    <p>Бағыттылық әртүрлі формада көрінеді: әуестік, тілек, ұмтылыс, қызығу, бейімділік, идеал, дүниетаным және сенім. Ең қарапайым форма — әуестік, ал ең жоғары форма — сенім.</p>\n    <p><b>Мотив</b> — адамның әрекетке итермелейтін ішкі побуждение, көбіне қажеттілікті қанағаттандырумен байланысты. <b>Мотивация</b> мотивтен кең ұғым: ол мінез-құлықты бастайтын, бағыттайтын және қолдайтын себептер жүйесін білдіреді.</p>\n    <p>Қажеттілік — адамның белгілі бір жағдайларға, объектілерге немесе әрекетке мұқтаждығы. Қажеттілік мінез-құлықты белсендіреді, ал мақсат сол қажеттілікті қанағаттандыруға бағытталған саналы нәтиже ретінде көрінеді.</p>\n    <p>Адамның мотивациялық сферасы үш негізгі сипат бойынша бағаланады: кеңдік, икемділік және иерархиялылық. Кеңдік мотивтер мен қажеттіліктердің әртүрлілігін, икемділік бір мотивті әртүрлі құралмен қанағаттандыру мүмкіндігін, иерархиялылық мотивтердің күшіне қарай орналасуын білдіреді.</p>\n    <p>Леонтьев бойынша мотивациялық сфера іс-әрекетте дамиды. Оның маңызды механизмі — мотивтің мақсатқа ауысуы: бастапқыда басқа мотив үшін орындалған мақсат уақыт өте келе адамның өзіне дербес мотивке айналуы мүмкін.</p>\n    <p><b>Қабілет</b> — адамның белгілі бір іс-әрекетті сәтті орындауына мүмкіндік беретін жеке психологиялық ерекшеліктер. Қабілет білім, дағды немесе іскерліктің өзі емес, бірақ оларды меңгерудің жеңілдігі мен жылдамдығына әсер етеді.</p>\n    <p>Қабілеттер жалпы және арнайы, теориялық және практикалық, оқу және шығармашылық болып бөлінеді. Жалпы қабілеттер көптеген әрекет түрлеріне қажет болса, арнайы қабілеттер нақты әрекет саласында табысқа жетуге көмектеседі.</p>\n    <p>Қабілеттің табиғи алғышарты — нышандар. Бірақ нышандар қабілеттің дайын түрі емес. Қабілет нақты іс-әрекетте, жаттығуда, оқытуда және әлеуметтік жағдайларда дамиды. Қабілеттер бір-бірімен байланысып, бір қабілеттің әлсіздігі басқа қабілеттермен компенсациялануы мүмкін.</p>\n  ",

    "title": "24-тарау — Темперамент / 25-тарау — Мінез",
    "desc": "Бұл біріктірілген бөлімде темпераменттің тұлға қасиеті ретіндегі мәні, темперамент типтері, Гиппократ, Кречмер, Шелдон, Павлов, Теплов және Русалов көзқарастары, жүйке жүйесінің қасиеттері, темперамент пен іс-әрекет стилі, сондай-ақ мінез ұғымы, мінез бітістері, мінездің қалыптасуы және акцентуация мәселелері қарастырылады.",
    "summary": "\n    <h3>Қысқаша мазмұны</h3>\n    <p><b>Темперамент</b> — адамның психикалық әрекетінің динамикалық ерекшеліктерін сипаттайтын тұлға қасиеті. Ол эмоцияның пайда болу жылдамдығымен, күштілігімен, тұрақтылығымен, әрекет қарқынымен, белсенділікпен және жалпы қимыл-қозғалыс ерекшеліктерімен байланысты.</p>\n    <p>Б.М. Теплов бойынша темперамент адамның эмоциялық қозғыштығы, сезімдердің пайда болу жылдамдығы және күшімен байланысты психикалық ерекшеліктер жиынтығы ретінде түсіндіріледі. Темпераменттің негізгі екі жағы — белсенділік және эмоциялық.</p>\n    <p>Классикалық төрт тип: холерик, сангвиник, меланхолик және флегматик. Холерикте сезімдер тез әрі күшті пайда болады; сангвиникте сезімдер тез, бірақ салыстырмалы әлсіз және тез ауысады; меланхоликте сезімдер баяу пайда болғанымен, күшті әрі ұзақ болады; флегматикте сезімдер баяу және әлсіз көрінеді.</p>\n    <p>Темперамент қабілет пен дарындылықты тікелей анықтамайды. Үлкен қабілет кез келген темперамент типінде кездесуі мүмкін. Темперамент көбіне іс-әрекеттің нәтижесін емес, сол нәтижеге жету тәсілін, яғни жеке стильді анықтайды.</p>\n    <p>И.П. Павлов темпераменттің физиологиялық негізін жүйке жүйесінің қасиеттерімен байланыстырды: қозу күші, тежелу күші, олардың тепе-теңдігі және қозғалғыштығы. Осы қасиеттердің үйлесімі жүйке жүйесінің типін құрайды.</p>\n    <p><b>Мінез</b> — адамның іс-әрекетінде және адамдарға, өзіне, еңбекке, дүниеге қатынасында көрінетін тұрақты жеке психикалық қасиеттер жиынтығы. Мінез адамның әдеттегі әрекет тәсілдерінде, шешім қабылдауында, қарым-қатынасында және өмірлік мақсаттарында байқалады.</p>\n    <p>Мінез туа біткен дайын қасиет емес. Ол өмір барысында, қоғамдық жағдайларда, отбасыда, мектепте, еңбек ұжымында, референттік топтарда және адамның өз тәжірибесінде қалыптасады.</p>\n    <p>Мінез бітістері адамның типтік жағдайларда қалай әрекет ететінін көрсетеді. Олар еріктік, эмоциялық және интеллектуалдық бітістер ретінде немесе адамның басқа адамдарға, еңбекке, өзіне және дүниеге қатынасы бойынша жіктеледі.</p>\n    <p>Мінез бен темперамент байланысты, бірақ бірдей емес. Темперамент мінездің динамикалық жағына әсер етеді, ал мінез адамның әлеуметтік тәжірибесі, тәрбиесі, құндылықтары және өмір салты арқылы қалыптасады.</p>\n  ",

    const $ = (s, r=document) => r.querySelector(s);
    const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));
    const content = $('#content');
    const chapterList = $('#chapterList');
    const searchInput = $('#searchInput');
    const norm = v => String(v||'').toLowerCase().replace(/\s+/g,' ').trim();
    $('#statBlocks').textContent = DATA.length;
    $('#statQuestions').textContent = DATA.reduce((s,b)=>s+b.questions.length,0);
    function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
    function renderNav(activeId){chapterList.innerHTML=DATA.map((b,i)=>`<button class="chapter-btn ${b.id===activeId?'active':''}" data-id="${b.id}"><b>${i+1}. ${esc(b.title)}</b><small>${b.questions.length} сұрақ</small></button>`).join(''); $$('.chapter-btn').forEach(btn=>btn.onclick=()=>document.getElementById(btn.dataset.id)?.scrollIntoView({behavior:'smooth',block:'start'}));}
    function render(filter=''){const f=norm(filter); content.innerHTML=''; let firstId=''; DATA.forEach((b)=>{const hay=norm([b.title,b.desc,b.part,b.keys.join(' '),b.questions.map(q=>q.q+' '+q.options.join(' ')).join(' ')].join(' ')); if(f && !hay.includes(f)) return; if(!firstId) firstId=b.id; const el=document.createElement('section'); el.className='block'; el.id=b.id; el.innerHTML=`<div class="block-head"><span class="part">${esc(b.part)}</span><h2>${esc(b.title)}</h2><p class="desc">${esc(b.desc)}</p></div><div class="block-body"><div class="summary">${b.summary}</div><div class="keys"><h3>Негізгі ұғымдар</h3><ul>${b.keys.map(k=>`<li>${esc(k)}</li>`).join('')}</ul></div><h3 class="test-title">Тест сұрақтары</h3><div class="questions">${b.questions.map((q,qi)=>renderQuestion(b.id,q,qi)).join('')}</div><div class="actions"><button class="action" onclick="checkBlock('${b.id}')">Нәтижені көрсету</button><button class="action secondary" onclick="resetBlock('${b.id}')">Қайта өту</button></div><div id="result-${b.id}" class="result-box"></div></div>`; content.appendChild(el); }); renderNav(firstId); }
    function renderQuestion(blockId,q,qi){const name=`${blockId}-q${qi}`; const inputType=q.type==='multi'?'checkbox':'radio'; return `<div class="question" data-q="${qi}"><div class="q-top"><div class="q-num">${qi+1}</div><div><div class="q-text">${esc(q.q)}</div><span class="q-type">${q.type==='multi'?'Бірнеше жауап':'Бір жауап'}</span></div></div><div class="options">${q.options.map((op,oi)=>`<label class="option"><input type="${inputType}" name="${name}" value="${esc(op)}"><span>${esc(op)}</span></label>`).join('')}</div><div class="explain"><b>Түсіндірме:</b> ${esc(q.e)}<span class="source">Дереккөз: ${esc(q.source)}</span></div></div>`;}
    function sameSet(a,b){a=[...a].map(norm).sort(); b=[...b].map(norm).sort(); return a.length===b.length && a.every((v,i)=>v===b[i]);}
    window.checkBlock=function(blockId){const b=DATA.find(x=>x.id===blockId); const root=document.getElementById(blockId); let correct=0; b.questions.forEach((q,qi)=>{const box=root.querySelector(`.question[data-q="${qi}"]`); const chosen=$$('input:checked',box).map(i=>i.value); if(sameSet(chosen,q.a)) correct++; $$('.option',box).forEach(l=>{const val=$('input',l).value; const isCorrect=q.a.map(norm).includes(norm(val)); const isChosen=$('input',l).checked; l.classList.toggle('correct',isCorrect); l.classList.toggle('wrong',isChosen&&!isCorrect); $('input',l).disabled=true; }); $('.explain',box).classList.add('show'); }); const result=$(`#result-${blockId}`); result.classList.add('show'); result.innerHTML=`<div class="result-main"><div class="score">${correct} / ${b.questions.length}</div><div class="note">Дұрыс жауаптар жасыл түспен белгіленді.</div></div>`; result.scrollIntoView({behavior:'smooth',block:'nearest'}); }
    window.resetBlock=function(blockId){const root=document.getElementById(blockId); $$('input',root).forEach(i=>{i.checked=false;i.disabled=false;}); $$('.option',root).forEach(o=>o.classList.remove('correct','wrong')); $$('.explain',root).forEach(e=>e.classList.remove('show')); const r=$(`#result-${blockId}`); r.classList.remove('show'); r.innerHTML=''; }
    searchInput.addEventListener('input', e=>render(e.target.value));
    document.addEventListener('scroll',()=>{let current=''; DATA.forEach(b=>{const el=document.getElementById(b.id); if(el && el.getBoundingClientRect().top<160) current=b.id;}); $$('.chapter-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.id===current));},{passive:true});
